services:
  core-service:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ticketlemon-core-service
    ports:
      - "8003:8003"
    environment:
      PORT: ${PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  database:
    image: postgres:18
    container_name: core-service-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Bangkok
    command:
      - "postgres"
      - "-c"
      - "timezone=Asia/Bangkok"
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: